    <meta name="robots" content="index,follow" />

    <meta name="HandheldFriendly" content="true">
    
    <title>House-of-Coral | Marketplace • Real Estate • Gaming • Live Streaming • Academy</title>

    <meta name="description" content="House-of-Coral: A unified ecosystem of 8 digital pillars." />

    <link rel="mask-icon" href="/assets/icons/safari-pinned-tab.svg" color="#2d3436" />
    
    <!-- Open Graph & Twitter -->

    <meta name="twitter:description" content="One Platform. Eight Powerful Digital Pillars.">

    <meta name="twitter:image:alt" content="House-of-Coral Platform">

    <meta name="twitter:creator" content="@HouseOfCoral">
    
    <!-- PWA & Theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-TileColor" content="#2d3436" />
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta name="msapplication-tooltip" content="House-of-Coral">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "House-of-Coral",
      "url": "https://houseofcoral.com/",
      "logo": "https://houseofcoral.com/assets/images/logo.png",
      "description": "Unified ecosystem of eight digital pillars.",
      "foundingDate": "2026"
    }
    </script>

    <script> 
      try {
        const savedTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); 
        document.documentElement.dataset.theme = savedTheme;
      } catch {}
    </script>
    
    <link rel="stylesheet" href="/assets/styles/theme.css" />
  </head>
  <body class="hoc-loading">
    <a class="skip-link" href="#root">Skip to content</a>
    <div id="sr-announcer" aria-live="polite" aria-atomic="true" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;"></div>
    
    <div id="root" aria-live="polite" data-app="house-of-coral">
      <div class="loading-screen" role="status" aria-label="Loading platform" aria-atomic="true">
        <img src="/assets/images/logo.png" alt="House-of-Coral Logo" class="loading-logo" />
        <div class="spinner" role="progressbar" aria-valuenow="0" aria-valuetext="Loading" aria-valuemin="0" aria-valuemax="100"></div>
        <div class="loading-progress"><div class="loading-progress-bar"></div></div>
        <div id="loading-text">Loading Core Engine...</div>
        <small class="loading-version">Version 1.0.0</small>
      </div>
    </div>

    <div id="error-root"></div>
    <div id="modal-root"></div>
    <div id="toast-root"></div>
    <div id="tooltip-root"></div>
    <div id="drawer-root"></div>
    <div id="notification-root"></div>
    <div id="overlay-root"></div>
    <div id="context-menu-root"></div>
    <div id="offline-banner" aria-live="assertive"></div>
    <div id="analytics-root"></div>

    <script>
      const messages = ["Loading Core Engine...", "Loading Bazaar...", "Loading Arena...", "Loading Stage...", "Loading Global Link...", "Loading Academy...", "Loading Treasury...", "Preparing Dashboard..."];
      let i = 0;
      const interval = setInterval(() => {
        const el = document.getElementById("loading-text");
        if (el && i < messages.length) el.innerText = messages[i++];
      }, 800);
      window.addEventListener("load", () => clearInterval(interval));
      window.addEventListener("offline", () => document.getElementById("offline-banner").innerText = "You are offline");
      window.addEventListener("online", () => document.getElementById("offline-banner").innerText = "");
    </script>

    <noscript>JavaScript is required to run House-of-Coral.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
